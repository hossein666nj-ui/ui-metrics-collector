<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Metrics Aggregator</title>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #121212;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .dashboard {
      background: #1e1e1e;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
      max-width: 450px;
      width: 90%;
    }
    h1 {
      margin-top: 0;
      font-weight: 500;
      color: #ffffff;
      font-size: 24px;
    }
    .status-badge {
      display: inline-block;
      padding: 6px 14px;
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
      border-radius: 20px;
      font-size: 13px;
      margin-bottom: 24px;
      border: 1px solid rgba(16, 185, 129, 0.3);
      letter-spacing: 0.5px;
    }
    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 35px;
      font-size: 15px;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #ff007a, #7928ca);
      color: white;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 0, 122, 0.4);
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="status-badge">● Ingestion Endpoint Active</div>
    <h1>UI Metrics Aggregator</h1>
    <p>This service is actively processing real-time performance and interaction telemetry from frontend clients. All background workers are operational.</p>
    <a href="#" class="btn">View API Documentation</a>
  </div>
</body>
</html>
